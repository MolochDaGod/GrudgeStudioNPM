<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRUDGE Character Viewer</title>
  <link rel="icon" href="favicon.ico" sizes="48x48" />
  <link rel="icon" type="image/png" href="favicon-32x32.png" sizes="32x32" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Jost:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Jost', sans-serif;
      background: #020617;
      color: #e2e8f0;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.95), rgba(30, 41, 59, 0.9));
      border-bottom: 1px solid rgba(245, 158, 11, 0.25);
      flex-shrink: 0;
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .brand-badge {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 11px;
      color: #fff;
      background: #c2410c;
      box-shadow: 0 0 14px rgba(194, 65, 12, 0.4);
    }

    .brand-title {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.06em;
      color: #fde68a;
    }

    .brand-sub {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.28em;
      color: rgba(251, 191, 36, 0.6);
    }

    .divider {
      width: 1px;
      height: 24px;
      background: rgba(245, 158, 11, 0.2);
      flex-shrink: 0;
    }

    #race-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    .race-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid rgba(245, 158, 11, 0.15);
      background: rgba(15, 23, 42, 0.5);
      color: #94a3b8;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .race-chip:hover {
      color: #fde68a;
      border-color: rgba(245, 158, 11, 0.5);
    }

    .race-chip.active {
      color: #fff;
      border-color: var(--race-color);
      background: var(--race-color);
      box-shadow: 0 0 12px color-mix(in srgb, var(--race-color) 55%, transparent);
    }

    .race-abbr { font-weight: 700; }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    #status-text {
      font-size: 12px;
      color: #fbbf24;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-links {
      display: flex;
      gap: 8px;
    }

    .nav-links a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid rgba(100, 116, 139, 0.3);
      transition: all 0.2s;
    }

    .nav-links a:hover {
      color: #fde68a;
      border-color: rgba(245, 158, 11, 0.4);
    }

    .viewport {
      flex: 1;
      position: relative;
      background: radial-gradient(ellipse at 50% 42%, #1e293b 0%, #020617 70%);
      overflow: hidden;
    }

    #viewer {
      position: absolute;
      inset: 0;
    }

    .controls-bar {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 10px;
      z-index: 10;
    }

    .animation-select {
      background: #0f172a;
      color: #fde68a;
      border: 1px solid rgba(245, 158, 11, 0.25);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      min-width: 140px;
    }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #94a3b8;
      cursor: pointer;
      user-select: none;
    }

    .toggle-label input { accent-color: #f59e0b; }

    #info-panel {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 11px;
      line-height: 1.6;
      min-width: 240px;
      z-index: 10;
      color: #cbd5e1;
    }

    #info-panel strong {
      color: #fde68a;
      font-weight: 600;
    }

    .kit-badge {
      position: absolute;
      bottom: 16px;
      right: 16px;
      font-size: 10px;
      color: rgba(148, 163, 184, 0.7);
      background: rgba(15, 23, 42, 0.7);
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid rgba(100, 116, 139, 0.3);
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="brand">
        <div class="brand-badge" id="brand-abbr">BRB</div>
        <div>
          <div class="brand-title" id="brand-name">Barbarians</div>
          <div class="brand-sub">Character Viewer</div>
        </div>
      </div>

      <div class="divider"></div>
      <div id="race-bar"></div>

      <div class="header-right">
        <span id="status-text">Initializing…</span>
        <nav class="nav-links">
          <a href="character-builder.html">Foundry</a>
          <a href="skill-tree.html">Skills</a>
          <a href="index.html">Arena</a>
        </nav>
      </div>
    </header>

    <div class="viewport">
      <div id="viewer"></div>

      <div id="info-panel">
        <div><strong>Kit</strong> grudge-studio/character-kit</div>
        <div>Loading GRUDGE 6 roster…</div>
      </div>

      <div class="controls-bar">
        <select class="animation-select" id="animation-select" title="Baked Bip001 clips">
          <option value="">Animations</option>
        </select>
        <label class="toggle-label">
          <input type="checkbox" id="toggle-skeleton"> Skeleton
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="toggle-grid" checked> Grid
        </label>
      </div>

      <div class="kit-badge">Bip001 · baked clips · Mixamo map offline</div>
    </div>
  </div>

  <script type="module" src="/src/viewer/grudge6-main.js"></script>
</body>
</html>
